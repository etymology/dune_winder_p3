services:
  influxdb:
    image: influxdb:2
    container_name: dune_influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: dune_winder
      DOCKER_INFLUXDB_INIT_ORG: dune
      DOCKER_INFLUXDB_INIT_BUCKET: winder
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dune-winder-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: dune_grafana
    depends_on:
      - influxdb
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "dune_winder"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dune_winder.json
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "200ms"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data:
