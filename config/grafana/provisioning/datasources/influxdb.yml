apiVersion: 1

datasources:
  - name: InfluxDB
    uid: dune-influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: dune
      defaultBucket: winder
    secureJsonData:
      token: dune-winder-token
