<div id="apaColumns">
  <section id="column1">
    <article id="apaGCodePanel">
      <h2>G-Code</h2>
      <div class="apaGCodeTopRow">
        <section class="apaGCodeSubbox apaGCodeControlBox">
          <h3>G-Code Control</h3>
          <p>
            Current line: <span id="currentLine">-</span> of
            <span id="totalLines">-</span>
          </p>
          <div class="apaGCodeButtonRow">
            <button id="startButton" onclick="apa.setRunningState(true)">
              Start
            </button>
            <button id="stopButton" onclick="apa.stopNext()">Stop Next</button>
            <button id="stepButton" onclick="apa.stepG_Code()">Step</button>
          </div>
        </section>
      </div>

      <div class="apaGCodeBottomRow">
        <section class="apaGCodeSubbox">
          <h3>G-Code Selection</h3>
          <label for="layerSelection">Layer</label>
          <div class="select">
            <select onchange="apa.selectLayer()" id="layerSelection">
              <option value="G">G</option>
              <option value="U">U</option>
              <option value="V">V</option>
              <option value="X">X</option>
            </select>
          </div>
          <label for="gCodeSelection">G-Code selection</label>
          <div class="select">
            <select onchange="apa.selectG_Code()" id="gCodeSelection">
              <option value=""></option>
            </select>
          </div>
          <div class="apaGCodeButtonRow">
            <button id="openGCodeButton" onclick="apa.openG_Code()">
              Open G-code
            </button>
            <button id="openCalibrationButton" onclick="apa.openCalibration()">
              Open calibration
            </button>
          </div>
        </section>

        <section id="gCodeControlDiv" class="apaGCodeSubbox">
          <h3>Line Seek</h3>
          <label for="apaLine">Next line</label>
          <div class="apaGCodeInlineRow">
            <input type="text" id="apaLine" />
            <button onclick="apa.gotoLine()">Go</button>
            <button onclick="apa.nextLine()">+</button>
            <button onclick="apa.previousLine()">-</button>
            <button onclick="apa.refreshGCode()">Refresh</button>
          </div>

          <h3>Go to wrap</h3>
          <label for="wrapNumber">Wrap</label>
          <div class="apaGCodeInlineRow">
            <input type="number" id="wrapNumber" min="0" style="width: 4em" />
            <button onclick="apa.gotoWrap()">Go</button>
          </div>
        </section>
      </div>
    </article>
    <div id="manualMoveCard">Loading...</div>
  </section>

  <section id="column2">
    <article id="forecastDiv">
      <h3>Forecast</h3>
      <p id="forecastWrapText">-</p>
    </article>
    <article id="gCodeDiv">Loading...</article>
  </section>

  <section id="column3">
    <article id="positionGraphicDiv">Loading...</article>
  </section>
</div>

<section id="column4">
  <article id="recentLogDiv">Loading...</article>
</section>
